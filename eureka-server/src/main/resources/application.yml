#   application:
#     name: eureka-server
#   config:
#     import: optional:configserver:http://config-service:8888

spring:
  application:
    name: eureka-server

server:
  port: 8761

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    hostname: eureka-server
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health