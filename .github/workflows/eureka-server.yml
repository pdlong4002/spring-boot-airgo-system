name: CI Eureka Server

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'eureka-server/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'eureka-server/**'

jobs:
  trigger-build:
    uses: ./.github/workflows/build-template.yml
    with:
      service-name: eureka-server
      service-dir: eureka-server
