server:
  port: 8081
  error:
    include-stacktrace: never
    include-message: always
    include-binding-errors: never

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://mysql:3306/microservice?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DATABASE_USERNAME:csdl_longsama}
    password: ${DATABASE_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Kafka Producer Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
            scope:
              - user:email
              - read:user
        provider:
          facebook:
            authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
            token-uri: https://graph.facebook.com/v18.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,first_name,last_name,name,email,verified,is_verified,picture.width(250).height(250)
            user-name-attribute: id

app:
  auth:
    tokenSecret: ${TOKEN_SECRET}
    tokenExpiration: 86400000 # 24 hours
    refreshTokenExpiration: 604800000 # 7 days
  oauth2:
    authorizedRedirectUris: http://localhost:8080/api/v1/auth/oauth2-success
  cors:
    allowedOrigins: http://localhost:3000,http://localhost:8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  #    register-with-eureka: true
  #    fetch-registry: true
  instance:
    hostname: auth-service
    prefer-ip-address: true


logging:
  level:
    com.netflix.discovery: DEBUG
    org.springframework.cloud.netflix: DEBUG
    org.springframework.cloud: DEBUG