server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/microservice?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DATABASE_USERNAME:csdl_longsama}
    password: ${DATABASE_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
    consumer:
      group-id: booking-payment-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "com.ramennsama.springboot.paymentservice.dto.event.PaymentSuccessEvent:com.ramennsama.springboot.bookingservice.dto.event.PaymentSuccessEvent"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  #    register-with-eureka: true
  #    fetch-registry: true
  instance:
    hostname: booking-service
    prefer-ip-address: true

seat-service:
  url: http://seat-service:8083/api/v1/seats

flight-service:
  url: http://flight-service:8082/api/v1/flights

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs