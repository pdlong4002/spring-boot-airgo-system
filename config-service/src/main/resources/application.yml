server:
  port: 8888

spring:
  application:
    name: config-service
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configurations

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/ #http://eureka-server:8761/eureka/
  #    register-with-eureka: true
  #    fetch-registry: true
  instance:
    hostname: config-service
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health