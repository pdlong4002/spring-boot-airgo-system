services:
  # database mysql
  mysql:
    container_name: mysql
    build:
      context: ./mysql
      args:
        - MYSQL_DATABASE=${MYSQL_DATABASE}
        - MYSQL_USER=${MYSQL_USER}
        - MYSQL_PASSWORD=${MYSQL_PASSWORD}
        - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/mysql-data:/var/lib/mysql
    networks:
      - spring-microservice
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # cache redis
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - spring-microservice

  # Apache Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - spring-microservice

  # Apache Kafka (Message Broker)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # INTERNAL dùng trong mạng Docker (kafka:9092), EXTERNAL dùng cho máy host (localhost:29092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - ./kafka-data:/var/lib/kafka/data
    networks:
      - spring-microservice

  # eureka server
  eureka-server:
    container_name: eureka-server
    build:
      context: ./eureka-server
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: false
      EUREKA_CLIENT_FETCH_REGISTRY: false
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
    networks:
      - spring-microservice
    healthcheck: # dam bao cac service khac muon su dung phai check xong eureka
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # config service
  config-service:
    container_name: config-service
    build:
      context: ./config-service
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - spring-microservice
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EUREKA_INSTANCE_INSTANCE_ID: config-service
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # api gateway
  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - spring-microservice
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_INSTANCE_INSTANCE_ID: api-gateway
      TOKEN_SECRET: ${TOKEN_SECRET}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"

  # authentication service
  auth-service:
    container_name: auth-service
    build:
      context: ./auth-service
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - spring-microservice
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/microservice?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimeZone=UTC
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_APPLICATION_NAME: auth-service
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_INSTANCE_INSTANCE_ID: auth-service
      TOKEN_SECRET: ${TOKEN_SECRET}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"

  # flight service
  flight-service:
    container_name: flight-service
    build:
      context: ./flight-service
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - spring-microservice
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/microservice?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimeZone=UTC
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_APPLICATION_NAME: flight-service
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_INSTANCE_INSTANCE_ID: flight-service
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"

  # seat service
  seat-service:
    container_name: seat-service
    build:
      context: ./seat-service
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - spring-microservice
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/microservice?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimeZone=UTC
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_APPLICATION_NAME: seat-service
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_INSTANCE_INSTANCE_ID: seat-service
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"

  # booking service
  booking-service:
    container_name: booking-service
    build:
      context: ./booking-service
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - spring-microservice
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/microservice?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimeZone=UTC
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_APPLICATION_NAME: booking-service
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_INSTANCE_INSTANCE_ID: booking-service
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"

  # notification service
  notification-service:
    container_name: notification-service
    build:
      context: ./notification-service
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - spring-microservice
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/microservice?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimeZone=UTC
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_APPLICATION_NAME: notification-service
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_INSTANCE_INSTANCE_ID: notification-service
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092} # - nua moi dc
      EMAIL_ADDRESS: ${EMAIL_ADDRESS}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"

  # payment service
  payment-service:
    container_name: payment-service
    build:
      context: ./payment-service
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - spring-microservice
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: payment-service
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-service:8888
      EUREKA_INSTANCE_INSTANCE_ID: payment-service
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      TMN_CODE: ${TMN_CODE}
      SECRET_KEY: ${SECRET_KEY}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"

# network
networks:
  spring-microservice:
    driver: bridge