<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirGo Sandbox Mock Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --momo-color: #a50064;
            --zalopay-color: #008fe5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .payment-card {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .brand-badge {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .brand-momo {
            background: var(--momo-color);
        }

        .brand-zalopay {
            background: var(--zalopay-color);
        }

        .amount-display {
            font-size: 38px;
            font-weight: 800;
            color: #818cf8;
            margin-bottom: 25px;
        }

        .info-grid {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            font-weight: 600;
            color: var(--text-main);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-success {
            background: linear-gradient(to right, #10b981, #059669);
            color: white;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .sandbox-tag {
            font-size: 11px;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            margin-top: 10px;
            display: inline-block;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <!-- Hiển thị thương hiệu động dựa trên paymentMethod -->
    <div th:class="${'brand-badge brand-' + #strings.toLowerCase(paymentMethod)}"
         th:text="${#strings.toUpperCase(paymentMethod) + ' SANDBOX'}">
        MOCK GAYWAY
    </div>

    <div>
        <span class="sandbox-tag">PHƯƠNG THỨC MÔ PHỎNG TESTING</span>
    </div>

    <div class="amount-display" th:text="${amount + ' USD'}">
        150 USD
    </div>

    <div class="info-grid">
        <div class="info-row">
            <span class="info-label">Khách hàng</span>
            <span class="info-value" th:text="${fullName}">Nguyen Van A</span>
        </div>
        <div class="info-row">
            <span class="info-label">Email nhận vé</span>
            <span class="info-value" th:text="${email}">mail@example.com</span>
        </div>
        <div class="info-row">
            <span class="info-label">Mã đặt vé</span>
            <span class="info-value" th:text="${txnRef}" style="color: #818cf8;">AG123456</span>
        </div>
        <div class="info-row">
            <span class="info-label">Cổng thanh toán</span>
            <span class="info-value" th:text="${paymentMethod}">MOMO</span>
        </div>
    </div>

    <form th:action="@{/api/v1/payments/confirm-mock-payment}" method="POST">
        <input type="hidden" name="fullName" th:value="${fullName}">
        <input type="hidden" name="email" th:value="${email}">
        <input type="hidden" name="amount" th:value="${amount}">
        <input type="hidden" name="txnRef" th:value="${txnRef}">
        <input type="hidden" name="paymentMethod" th:value="${paymentMethod}">

        <div class="btn-group">
            <button class="btn btn-success" type="submit" name="status" value="SUCCESS">
                Xác Nhận Thanh Toán Thành Công
            </button>
            <button class="btn btn-danger" type="submit" name="status" value="FAILED">
                Hủy Giao Dịch / Từ Chối Thanh Toán
            </button>
        </div>
    </form>
</div>

</body>
</html>
