server:
  port: 8082

spring:
  application:
    name: flight-service
  cloud:
    config:
      enabled: false

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/microservice?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DATABASE_USERNAME:csdl_longsama}
    password: ${DATABASE_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    enabled: false
  instance:
    hostname: localhost
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
